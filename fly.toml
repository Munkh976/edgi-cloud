# fly.toml app configuration file generated for datasette-campd on 2025-08-01T02:07:43-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'edgi-cloud'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8001'
  EDGI_DATA_DIR = "/data"
  EDGI_STATIC_DIR = "/app/static"
  PORTAL_DB_PATH = "/data/portal.db"
  # IMPORTANT: Generate a strong secret key for production
  CSRF_SECRET_KEY = "csrf-production-secret-key-change-this-to-a-very-long-random-string-with-at-least-64-characters-for-security"

[mounts]
  source = "edgi_data"
  destination = "/data"

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[[statics]]
  guest_path = '/data/static'
  url_prefix = '/static'

